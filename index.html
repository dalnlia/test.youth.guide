  <!-- OG 기본값 (결과 화면에서 JS로 교체) -->

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  window.addEventListener('DOMContentLoaded', function() {
    if (window.Kakao && !Kakao.isInitialized()) {
      Kakao.init('YOUR_KAKAO_JS_KEY');
