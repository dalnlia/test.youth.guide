    #save-card {

      background: #F5F0E8;

    .save-card-inner {

    .save-card-inner::before {
      content: '';

      height: 8px;
      background: linear-gradient(90deg, #3DBFBF, #5DD6D6, #3DBFBF);

    .save-img {
      width: 220px; height: 220px;
      object-fit: contain; margin-bottom: 16px;

    .save-name {
      font-size: 32px; font-weight: 900;
      font-family: 'Cafe24Ssurround', sans-serif;
      color: #2D2D2D; margin-bottom: 6px;

      letter-spacing: -0.03em;

      border: 1.5px solid #E8DCC8;
      text-align: left;
      letter-spacing: -0.02em;
    }
    .save-footer {

      letter-spacing: -0.01em;

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 32px 22px; }
      .q-text { font-size: 17px; }
      .start-title { font-size: 26px; }
      .result-name { font-size: 24px; }
      .result-img { width: 160px; height: 160px; }
    }
  </style>
</head>
<body>

let currentQ = -1;
let scores = {};
let currentResult = null;
Object.keys(results).forEach(k => scores[k] = 0);

function render(html) {
  const card = document.getElementById('card-content');
  card.innerHTML = html;
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function copyLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    showToast('🔗 링크가 복사됐어요!');
  }).catch(() => {
    prompt('아래 링크를 복사해서 공유해요!', url);
  });
}

function saveImage() {
  if (!currentResult) return;
  const r = currentResult;
  document.getElementById('save-img').src = r.img;
  document.getElementById('save-name').textContent = r.name;
  document.getElementById('save-sub').textContent = r.sub;
  document.getElementById('save-desc').textContent = r.desc;

  const saveCard = document.getElementById('save-card');
  saveCard.style.left = '0';
  saveCard.style.zIndex = '9999';
  showToast('⏳ 이미지 생성 중...');

  setTimeout(() => {
    html2canvas(document.getElementById('save-card-inner'), {
      scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#FFFDF8'
    }).then(canvas => {
      saveCard.style.left = '-9999px';
      saveCard.style.zIndex = '-1';
      const link = document.createElement('a');
      link.download = '내_자취_성향_' + r.name + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      showToast('🎉 이미지가 저장됐어요!');
    }).catch(() => {
      saveCard.style.left = '-9999px';
      showToast('저장에 실패했어요. 다시 시도해주세요.');
    });
  }, 500);
}

function showStart() {
  render(`
    <div class="start-screen">
      <img class="start-img" src="${BASE}0_start.png" alt="캐릭터" />
      <div class="start-title">나의 <span>자취 성향</span>은?</div>
      <div class="start-sub">8개 질문으로 알아보는<br>나에게 딱 맞는 자취 스타일!</div>
      <button class="start-btn" onclick="startQuiz()">테스트 시작</button>
    </div>
  `);
}

function startQuiz() {
  currentQ = 0;
  Object.keys(scores).forEach(k => scores[k] = 0);
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  const progress = Math.round((currentQ / questions.length) * 100);
  const optionsHtml = q.options.map((o, i) => `
    <button class="option-btn" onclick="selectOption(${i})">
      <span class="emoji-badge">${o.emoji}</span>
      <span>${o.text}</span>
    </button>
  `).join('');
  render(`
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <span class="progress-text">${currentQ + 1}/${questions.length}</span>
    </div>
    <div class="q-badge">Q${currentQ + 1}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${optionsHtml}</div>
  `);
}

function selectOption(idx) {
  const q = questions[currentQ];
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    if (i === idx) btn.classList.add('selected');
    btn.style.pointerEvents = 'none';
  });
  q.options[idx].types.forEach(t => { if (scores[t] !== undefined) scores[t]++; });
  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) showQuestion();
    else showResult();
  }, 420);
}

function showResult() {
  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const r = results[top];
  currentResult = r;
  render(`
    <div class="result-screen">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
        <span class="progress-text">완료!</span>
      </div>
      <div class="result-badge">나의 자취 유형</div>
      <img class="result-img" src="${r.img}" alt="${r.name}" />
      <div class="result-name">${r.name}</div>
      <div class="result-sub">${r.sub}</div>
      <div class="result-desc">${r.desc}</div>
      <div class="result-buttons">
        <button class="result-cta" onclick="window.open('${r.link}', '_blank')">나한테 딱 맞는 청년주택 확인</button>
        <div class="result-secondary-btns">
          <button class="result-share-btn" onclick="copyLink()">🔗 테스트 공유하기</button>
          <button class="result-save-btn" onclick="saveImage()">💾 이미지 저장하기</button>
        </div>
        <button class="result-retry" onclick="showStart()">다시 테스트하기</button>
      </div>
    </div>
  `);
}

showStart();
</script>
